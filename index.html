    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Do we need a microphone for an outdoor ceremony?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes—unless guest count is under ~10 and you are in Banff Mode. I include lapel and handheld mics, live-mixed so vows are intelligible at the back row."
          }
        },
        {
          "@type": "Question",
          "name": "What if the venue has no power or PA?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "I run a silent, generator-free battery system with backups. It is compliant for Parks Canada sites where amplification and generators are prohibited."
          }
        },
        {
          "@type": "Question",
          "name": "Can I change or upgrade my package later?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. You can upgrade up to 2 weeks before your ceremony. I update the plan and invoice seamlessly."
          }
        },
        {
          "@type": "Question",
          "name": "What is your refund policy?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "14-day full refund on deposit; after that, your credit is transferable per the policy PDF."
          }
        },
        {
          "@type": "Question",
          "name": "Do I get a written plan?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Within 24 hours you receive a PDF ceremony-audio plan covering SPL, power, mic, and cue details."
          }
        },
        {
          "@type": "Question",
          "name": "Will guests in the back hear our vows?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. My SPL-aware mixing targets 55–65 dBA for vows and is validated by logs taken at multiple positions."
          }
        },
        {
          "@type": "Question",
          "name": "What happens if gear fails?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "I carry triple redundancy: secondary mic chain, secondary amp, secondary keyboard, and a preloaded speaker for critical cues."
          }
        },
        {
          "@type": "Question",
          "name": "What if it rains or snows?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "I prepare a covered, relocatable setup and a pre-agreed Plan B position with your planner so we can move in minutes."
          }
        },
        {
          "@type": "Question",
          "name": "How fast is confirmation after booking?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Within 24 hours I send your PDF ceremony-audio plan with SPL, power, mic, and cue notes."
          }
        },
        {
          "@type": "Question",
          "name": "How do we compare this to a DJ or band?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ask them for an SPL log, a no-generator battery plan, and their backup stack. Then review my comparison on the Pricing page."
          }
        }
      ]
    }
    </script>
